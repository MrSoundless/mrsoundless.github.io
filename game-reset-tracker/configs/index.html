<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Import Presets</title>
  <style>
    body {
      margin: 0;
      font-family: "Segoe UI", sans-serif;
      background: #f6f1e8;
      color: #211c16;
    }
    main {
      max-width: 760px;
      margin: 0 auto;
      padding: 32px 18px;
    }
    .card {
      background: #fffaf2;
      border: 1px solid rgba(82, 63, 39, 0.12);
      border-radius: 18px;
      padding: 20px;
      margin-top: 18px;
    }
    a.button {
      display: inline-block;
      margin-top: 12px;
      padding: 10px 14px;
      border-radius: 999px;
      background: #1d6b57;
      color: white;
      text-decoration: none;
    }
    .muted {
      color: #6f665b;
    }
  </style>
</head>
<body>
  <main>
    <p class="muted">Game Reset Tracker</p>
    <h1>Import Presets</h1>
    <p class="muted">Download a game preset and import it from the app's Data panel.</p>

    <section class="card">
      <h2>Warframe</h2>
      <p class="muted">Based on the Warframe Tools Task Checklist. Daily, weekly, and event-oriented groups are mapped into the app's game/group/task format.</p>
      <a class="button" href="./warframe-task-checklist.json">Download preset</a>
    </section>
  </main>
</body>
</html>
